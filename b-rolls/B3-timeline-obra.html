<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<title>B-Roll B3 — Timeline Obra</title>
<link rel="stylesheet" href="_shared/styles.css">
<style>
  .wrap { flex:1; display:flex; flex-direction:column; gap:36px; justify-content:center; }
  h1 { font-size:52px; font-weight:800; letter-spacing:-0.02em; line-height:1.1; text-align:center; }
  .sub { font-size:22px; color:#94a3b8; text-align:center; }
  .bars { display:flex; flex-direction:column; gap:36px; margin-top:30px; }
  .row-label { display:flex; justify-content:space-between; margin-bottom:10px; }
  .row-title { font-size:22px; font-weight:700; }
  .row-time { font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:700; }
  .bar-track { height:64px; background:rgba(255,255,255,0.05); border-radius:12px; position:relative; overflow:hidden;
               border:1px solid rgba(255,255,255,0.08); }
  .bar-fill { height:100%; border-radius:12px; width:0%; transition:width 3s cubic-bezier(0.4,0,0.2,1);
              display:flex; align-items:center; padding-left:20px; font-weight:700; font-size:18px; color:#fff; }
  .bar-trad { background:linear-gradient(90deg,#64748b,#475569); box-shadow:0 0 20px rgba(100,116,139,0.3); }
  .bar-lsf { background:linear-gradient(90deg,#178FC6,#F07D17); box-shadow:0 0 25px rgba(23,143,198,0.5); }
  .phases { display:flex; gap:12px; margin-top:20px; opacity:0; transition:opacity 0.8s; }
  .phases.show { opacity:1; }
  .phase { flex:1; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
           border-radius:12px; padding:14px 10px; text-align:center; position:relative;
           opacity:0; transform:translateY(10px); transition:all 0.4s; }
  .phase.show { opacity:1; transform:translateY(0); }
  .phase-icon { font-size:28px; margin-bottom:6px; }
  .phase-name { font-size:13px; font-weight:600; color:#cbd5e1; letter-spacing:0.5px; }
  .phase.active { border-color:rgba(23,143,198,0.6); box-shadow:0 0 20px rgba(23,143,198,0.2);
                  background:linear-gradient(135deg,rgba(23,143,198,0.15),rgba(23,143,198,0.02)); }
  .vs-big { font-size:96px; font-weight:900; text-align:center; margin:0;
            background:linear-gradient(135deg,#F07D17,#178FC6); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .win-badge { text-align:center; font-size:28px; font-weight:700; color:#22c55e; opacity:0; transition:opacity 0.6s; margin-top:14px; }
  .win-badge.show { opacity:1; }
</style>
</head>
<body>
<div class="stage">
  <div class="grid-bg"></div>
  <div class="safe-area">
    <div class="logo-brand" style="margin-bottom:26px;"><img src="_shared/assets/logo-obrasnet.png"></div>
    <div class="wrap">
      <h1>Tradicional <span class="vs-big" style="font-size:52px; display:inline;">vs</span> <span class="text-gradient">LSF</span></h1>
      <p class="sub">Mesma casa T3, 135 m². Tempo real de obra.</p>
      <div class="bars">
        <div>
          <div class="row-label"><div class="row-title">🏗️ Construção Tradicional</div><div class="row-time" style="color:#94a3b8;">14 meses</div></div>
          <div class="bar-track"><div class="bar-fill bar-trad" id="tradBar">14 meses</div></div>
        </div>
        <div>
          <div class="row-label"><div class="row-title">⚡ OBRASNET · LSF</div><div class="row-time" style="color:#F07D17;">6 meses</div></div>
          <div class="bar-track"><div class="bar-fill bar-lsf" id="lsfBar">6 meses</div></div>
        </div>
      </div>
      <div class="phases" id="phases">
        <div class="phase"><div class="phase-icon">📐</div><div class="phase-name">Projecto</div></div>
        <div class="phase"><div class="phase-icon">🧱</div><div class="phase-name">Fundações</div></div>
        <div class="phase"><div class="phase-icon">🏗️</div><div class="phase-name">Estrutura</div></div>
        <div class="phase"><div class="phase-icon">🪟</div><div class="phase-name">Acabamentos</div></div>
        <div class="phase"><div class="phase-icon">🔑</div><div class="phase-name">Chaves</div></div>
      </div>
      <div class="win-badge" id="win">✓ 57% menos tempo · 0€ de atraso</div>
    </div>
  </div>
</div>
<script>
(function(){
  const wait=ms=>new Promise(r=>setTimeout(r,ms));
  async function run(){
    await wait(700);
    document.getElementById('tradBar').style.width='100%';
    await wait(1200);
    document.getElementById('lsfBar').style.width='43%';
    await wait(2400);
    document.getElementById('phases').classList.add('show');
    const phases=document.querySelectorAll('.phase');
    for(let i=0;i<phases.length;i++){await wait(350);phases[i].classList.add('show');phases[i].classList.add('active');}
    await wait(600);
    document.getElementById('win').classList.add('show');
    await wait(3500);
    window.location.reload();
  }
  window.addEventListener('load',()=>setTimeout(run,400));
})();
</script>
</body>
</html>
