<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<title>B-Roll D4 — Agendamento Showroom</title>
<link rel="stylesheet" href="_shared/styles.css">
<link rel="stylesheet" href="_shared/whatsapp.css">
<style>
  .cal-card { align-self:flex-start; background:#1f2c33; border-radius:14px; padding:18px; max-width:88%;
              border:1px solid rgba(255,255,255,0.06); opacity:0; transform:translateY(8px); transition:all 0.3s; }
  .cal-card.show { opacity:1; transform:translateY(0); }
  .cal-title { color:#e9edef; font-size:18px; font-weight:700; margin-bottom:12px; }
  .cal-month { color:#8696a0; font-size:14px; margin-bottom:10px; }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .cal-day { aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:16px;
             color:#aebac1; border-radius:8px; cursor:pointer; position:relative; }
  .cal-day.head { color:#64748b; font-size:11px; font-weight:700; text-transform:uppercase; }
  .cal-day.available { background:rgba(0,168,132,0.15); color:#00a884; font-weight:600; }
  .cal-day.selected { background:#00a884; color:#fff; transform:scale(1.1); box-shadow:0 0 15px rgba(0,168,132,0.5); }
  .time-slots { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; opacity:0; transition:opacity 0.4s; }
  .time-slots.show { opacity:1; }
  .slot { background:rgba(255,255,255,0.06); color:#e9edef; padding:8px 14px; border-radius:16px; font-size:14px; transition:all 0.2s; }
  .slot.picked { background:#00a884; box-shadow:0 0 15px rgba(0,168,132,0.4); }
  .location-card { align-self:flex-start; background:#1f2c33; border-radius:14px; padding:14px; max-width:80%;
                   opacity:0; transform:translateY(8px); transition:all 0.3s; }
  .location-card.show { opacity:1; transform:translateY(0); }
  .loc-map { height:140px; border-radius:10px; margin-bottom:10px;
             background:
               radial-gradient(circle at 50% 60%, rgba(23,143,198,0.3), transparent 40%),
               linear-gradient(135deg,#0b2538,#051826);
             position:relative; overflow:hidden;
             border:1px solid rgba(23,143,198,0.2); }
  .loc-map::after { content:'📍'; position:absolute; left:50%; top:50%; transform:translate(-50%,-100%); font-size:32px; filter:drop-shadow(0 4px 8px rgba(0,0,0,0.5)); }
  .loc-addr { color:#e9edef; font-size:15px; font-weight:600; }
  .loc-sub { color:#8696a0; font-size:12px; margin-top:2px; }
</style>
</head>
<body>
<div class="stage wa-stage">
  <div class="wa-chat-wrap">
    <div class="wa-header">
      <div class="wa-back">‹</div>
      <div class="wa-avatar">FC</div>
      <div class="wa-meta"><div class="wa-name">Felipe Cardoso · OBRASNET</div><div class="wa-status">online</div></div>
      <div class="wa-icons">📹 📞 ⋮</div>
    </div>
    <div class="wa-chat" id="chat"></div>
    <div class="wa-footer"><div class="wa-input">Escreve uma mensagem</div><div class="wa-send">➤</div></div>
  </div>
</div>
<script>
(function(){
  const chat=document.getElementById('chat');
  const wait=ms=>new Promise(r=>setTimeout(r,ms));
  function addB(s,t,time){const b=document.createElement('div');b.className='wa-bubble '+(s==='in'?'wa-bubble-in':'wa-bubble-out');b.innerHTML=t.replace(/\n/g,'<br>')+`<span class="time">${time}${s==='out'?'<span class="ticks">✓✓</span>':''}</span>`;chat.appendChild(b);requestAnimationFrame(()=>b.classList.add('show'));}
  function typing(){const t=document.createElement('div');t.className='wa-typing show';t.innerHTML='<span></span><span></span><span></span>';chat.appendChild(t);return t;}
  async function run(){
    await wait(600);
    addB('in','Gostava de ver uma obra a ser feita. É possível?', '11:20');
    await wait(900);
    let t=typing(); await wait(1700); t.remove();
    addB('out','Claro! Temos showroom em Óbidos. Vais escolher o dia ↓', '11:20');
    await wait(800);
    t=typing(); await wait(1300); t.remove();
    const cal=document.createElement('div');
    cal.className='cal-card';
    cal.innerHTML=`<div class="cal-title">📅 Agendar visita · Showroom Óbidos</div><div class="cal-month">Abril 2026</div>
      <div class="cal-grid">
        ${['S','T','Q','Q','S','S','D'].map(d=>`<div class="cal-day head">${d}</div>`).join('')}
        ${Array.from({length:30},(_,i)=>{
          const n=i+1;
          const avail=[18,22,23,24,25,29].includes(n);
          const sel=n===23;
          return `<div class="cal-day ${avail?'available':''} ${sel?'selected':''}">${n}</div>`;
        }).join('')}
      </div>
      <div class="time-slots" id="slots">
        <div class="slot">09:00</div><div class="slot picked">10:30</div><div class="slot">14:00</div><div class="slot">15:30</div>
      </div>`;
    chat.appendChild(cal);
    requestAnimationFrame(()=>cal.classList.add('show'));
    await wait(1000);
    document.getElementById('slots').classList.add('show');
    await wait(1500);
    addB('in','Dia 23 às 10:30 fica bom! ✅', '11:22');
    await wait(700);
    t=typing(); await wait(1400); t.remove();
    addB('out','Perfeito! Confirmado. Moro aqui o dia todo, vou levar-te a ver a obra em curso. Aqui fica a localização ↓', '11:22');
    await wait(600);
    const loc=document.createElement('div');
    loc.className='location-card';
    loc.innerHTML=`<div class="loc-map"></div><div class="loc-addr">Showroom OBRASNET</div><div class="loc-sub">Rua da Construção, 123 · Óbidos, Leiria</div>`;
    chat.appendChild(loc);
    requestAnimationFrame(()=>loc.classList.add('show'));
    await wait(3500);
    window.location.reload();
  }
  window.addEventListener('load',()=>setTimeout(run,400));
})();
</script>
</body>
</html>
