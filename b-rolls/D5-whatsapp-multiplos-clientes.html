<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<title>B-Roll D5 — Múltiplos Clientes</title>
<link rel="stylesheet" href="_shared/styles.css">
<style>
  body { background:#000; }
  .stage { background:#0b141a; display:flex; flex-direction:column; }
  .top { height:110px; background:#00a884; display:flex; align-items:center; padding:0 30px 0 24px; justify-content:space-between;
         padding-top:15%; padding-bottom:0; padding-inline:24px; }
  .wa-top { height:210px; background:linear-gradient(180deg,#1f2c33 0%,#1f2c33 100%); padding-top:15%; }
  .wa-top-inner { display:flex; align-items:center; justify-content:space-between; padding:40px 24px 12px; }
  .wa-top-inner .title { font-size:30px; font-weight:700; color:#e9edef; }
  .wa-top-inner .icons { display:flex; gap:22px; color:#aebac1; font-size:26px; }
  .wa-search { margin:12px 20px; background:#2a3942; border-radius:24px; padding:12px 20px; display:flex; align-items:center; gap:14px; }
  .wa-search-icon { color:#8696a0; font-size:20px; }
  .wa-search-text { color:#8696a0; font-size:18px; }
  .wa-tabs { display:flex; gap:12px; padding:4px 20px 16px; }
  .wa-tab { padding:8px 18px; border-radius:16px; font-size:16px; font-weight:600; }
  .wa-tab.active { background:rgba(0,168,132,0.2); color:#00a884; }
  .wa-tab.inactive { color:#8696a0; }
  .chat-list { flex:1; overflow:hidden; padding-bottom:15%; }
  .chat-item { display:flex; gap:14px; padding:18px 20px; align-items:center;
               border-bottom:1px solid rgba(255,255,255,0.04); position:relative; }
  .chat-av { width:64px; height:64px; border-radius:50%; flex-shrink:0; display:flex;
             align-items:center; justify-content:center; font-weight:700; color:#fff; font-size:22px; }
  .chat-body { flex:1; min-width:0; }
  .chat-top-row { display:flex; justify-content:space-between; align-items:center; }
  .chat-name { font-size:20px; color:#e9edef; font-weight:500; }
  .chat-time { font-size:13px; }
  .chat-time.unread { color:#00a884; font-weight:700; }
  .chat-time.read { color:#8696a0; }
  .chat-bot-row { display:flex; justify-content:space-between; align-items:center; margin-top:4px; }
  .chat-preview { font-size:16px; color:#8696a0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; margin-right:10px; }
  .chat-preview.typing-now { color:#00a884; font-style:italic; }
  .chat-badge { background:#00a884; color:#fff; border-radius:50%; min-width:26px; height:26px; padding:0 8px;
                display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700;
                transform:scale(0); transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  .chat-badge.show { transform:scale(1); }
  .chat-item.highlight { background:rgba(0,168,132,0.06); animation:flashNew 1s; }
  @keyframes flashNew {
    0% { background:rgba(0,168,132,0.25); }
    100% { background:rgba(0,168,132,0.06); }
  }
  .ticks-inline { color:#53bdeb; font-size:14px; letter-spacing:-3px; margin-right:4px; }
  .muted { color:#8696a0; }
</style>
</head>
<body>
<div class="stage">
  <div class="wa-top">
    <div class="wa-top-inner"><div class="title">OBRASNET · Felipe</div><div class="icons">📷 🔍 ⋮</div></div>
    <div class="wa-search"><span class="wa-search-icon">🔍</span><span class="wa-search-text">Pesquisar conversas…</span></div>
    <div class="wa-tabs"><div class="wa-tab active">Todas</div><div class="wa-tab inactive">Não lidas · <b id="unread">0</b></div><div class="wa-tab inactive">Grupos</div></div>
  </div>
  <div class="chat-list" id="list"></div>
</div>
<script>
(function(){
  const data=[
    {name:'João M. · T3 Óbidos', av:'JM', color:'linear-gradient(135deg,#178FC6,#F07D17)', preview:'Obrigado Felipe! Já falei com o banco.', time:'agora', unread:0, ticks:true},
    {name:'Ana S. · T4 Melgaço', av:'AS', color:'linear-gradient(135deg,#F07D17,#22c55e)', preview:'Posso pagar a entrada de 35.000€.', time:'14:28', unread:2},
    {name:'Pedro C. · T3 Tomar', av:'PC', color:'linear-gradient(135deg,#22c55e,#178FC6)', preview:'Quando posso visitar o showroom?', time:'14:15', unread:1},
    {name:'Mariana R. · T2 Braga', av:'MR', color:'linear-gradient(135deg,#a855f7,#178FC6)', preview:'a digitar…', time:'14:12', unread:0, typing:true},
    {name:'Carlos F. · T4 Algarve', av:'CF', color:'linear-gradient(135deg,#ef4444,#F07D17)', preview:'Perfeito! Envia o contrato.', time:'13:58', unread:3},
    {name:'Sofia L. · T3 Lisboa', av:'SL', color:'linear-gradient(135deg,#06b6d4,#3b82f6)', preview:'O terreno tem 450m², serve?', time:'13:40', unread:0, ticks:true},
    {name:'Rui P. · T2 Évora', av:'RP', color:'linear-gradient(135deg,#8b5cf6,#ec4899)', preview:'Ficou aprovado no BCP ✅', time:'12:50', unread:0, ticks:true},
    {name:'Helena G. · T4 Coimbra', av:'HG', color:'linear-gradient(135deg,#F07D17,#178FC6)', preview:'Quero o acabamento Premium.', time:'11:30', unread:0, ticks:true},
  ];
  const list=document.getElementById('list');
  const wait=ms=>new Promise(r=>setTimeout(r,ms));
  data.forEach((d,i)=>{
    const el=document.createElement('div');
    el.className='chat-item'; el.dataset.idx=i;
    el.innerHTML=`
      <div class="chat-av" style="background:${d.color}">${d.av}</div>
      <div class="chat-body">
        <div class="chat-top-row"><div class="chat-name">${d.name}</div><div class="chat-time ${d.unread?'unread':'read'}">${d.time}</div></div>
        <div class="chat-bot-row">
          <div class="chat-preview ${d.typing?'typing-now':''}">${d.ticks?'<span class="ticks-inline">✓✓</span>':''}${d.preview}</div>
          ${d.unread?`<div class="chat-badge">${d.unread}</div>`:''}
        </div>
      </div>`;
    list.appendChild(el);
  });
  async function run(){
    const items=document.querySelectorAll('.chat-item');
    await wait(600);
    items.forEach((it,i)=>{const b=it.querySelector('.chat-badge'); if(b) setTimeout(()=>b.classList.add('show'), i*100);});
    let total=0;
    data.forEach(d=>{total+=d.unread||0;});
    document.getElementById('unread').textContent=total;
    // Simulate new incoming messages
    const newMsgs=[
      {idx:2, preview:'Quando posso agendar visita?', time:'agora', unread:3},
      {idx:4, preview:'Mando a documentação amanhã.', time:'agora', unread:4},
      {idx:1, preview:'Banco pediu comprovativos.', time:'agora', unread:4}
    ];
    for(const m of newMsgs){
      await wait(2800);
      const it=items[m.idx];
      it.classList.add('highlight');
      it.querySelector('.chat-preview').textContent=m.preview;
      const timeEl=it.querySelector('.chat-time');
      timeEl.textContent=m.time; timeEl.className='chat-time unread';
      let badge=it.querySelector('.chat-badge');
      if(!badge){
        badge=document.createElement('div'); badge.className='chat-badge show';
        it.querySelector('.chat-bot-row').appendChild(badge);
      }
      badge.textContent=m.unread; badge.classList.add('show');
      total++; document.getElementById('unread').textContent=total;
      setTimeout(()=>it.classList.remove('highlight'), 1000);
    }
    await wait(3000);
    window.location.reload();
  }
  window.addEventListener('load',()=>setTimeout(run,400));
})();
</script>
</body>
</html>
