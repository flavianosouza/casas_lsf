<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<title>B-Roll D3 — Objecção Segurança</title>
<link rel="stylesheet" href="_shared/styles.css">
<link rel="stylesheet" href="_shared/whatsapp.css">
</head>
<body>
<div class="stage wa-stage">
  <div class="wa-chat-wrap">
    <div class="wa-header">
      <div class="wa-back">‹</div>
      <div class="wa-avatar">FC</div>
      <div class="wa-meta"><div class="wa-name">Felipe Cardoso · OBRASNET</div><div class="wa-status">online</div></div>
      <div class="wa-icons">📹 📞 ⋮</div>
    </div>
    <div class="wa-chat" id="chat"></div>
    <div class="wa-footer"><div class="wa-input">Escreve uma mensagem</div><div class="wa-send">➤</div></div>
  </div>
</div>
<script>
(function(){
  const chat=document.getElementById('chat');
  const convo=[
    {side:'in',text:'Casa de aço aguenta sismos? Tenho receio… 😟',time:'16:02'},
    {side:'out',delay:800,typing:2000,text:'Pergunta importante. Resposta directa: <b>LSF aguenta MELHOR que betão</b>. 🛡️',time:'16:02'},
    {side:'out',delay:500,typing:1800,text:'Estrutura em aço leve certificada pela <b>Norma Europeia EC3</b> (EN 1993). É a mesma norma usada em arranha-céus no Japão.',time:'16:03'},
    {side:'out',delay:600,typing:2200,text:'Por 3 razões técnicas:\n\n<b>1.</b> Estrutura leve = menos massa = menos força sísmica\n<b>2.</b> Aço é dúctil = deforma mas não parte\n<b>3.</b> Junções parafusadas distribuem a carga',time:'16:03'},
    {side:'in',delay:1100,text:'E o fogo?',time:'16:04'},
    {side:'out',delay:600,typing:1700,text:'Classe <b>REI 60</b> (60 min resistência) — padrão europeu. Pladur ignífugo + lã mineral. Certificado LNEC. 🔥',time:'16:04'},
    {side:'in',delay:1200,text:'Ok, já estou mais descansado. 💪',time:'16:05'}
  ];
  const wait=ms=>new Promise(r=>setTimeout(r,ms));
  function addB(s,t,time){const b=document.createElement('div');b.className='wa-bubble '+(s==='in'?'wa-bubble-in':'wa-bubble-out');b.innerHTML=t.replace(/\n/g,'<br>')+`<span class="time">${time}${s==='out'?'<span class="ticks">✓✓</span>':''}</span>`;chat.appendChild(b);requestAnimationFrame(()=>b.classList.add('show'));}
  function typing(){const t=document.createElement('div');t.className='wa-typing show';t.innerHTML='<span></span><span></span><span></span>';chat.appendChild(t);return t;}
  async function run(){await wait(600);for(const m of convo){if(m.delay)await wait(m.delay);if(m.typing){const t=typing();await wait(m.typing);t.remove();}addB(m.side,m.text,m.time);await wait(300);}await wait(3000);window.location.reload();}
  window.addEventListener('load',()=>setTimeout(run,400));
})();
</script>
</body>
</html>
