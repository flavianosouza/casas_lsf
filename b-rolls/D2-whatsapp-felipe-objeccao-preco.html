<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<title>B-Roll D2 — Objecção Preço</title>
<link rel="stylesheet" href="_shared/styles.css">
<link rel="stylesheet" href="_shared/whatsapp.css">
</head>
<body>
<div class="stage wa-stage">
  <div class="wa-chat-wrap">
    <div class="wa-header">
      <div class="wa-back">‹</div>
      <div class="wa-avatar">FC</div>
      <div class="wa-meta"><div class="wa-name">Felipe Cardoso · OBRASNET</div><div class="wa-status">online</div></div>
      <div class="wa-icons">📹 📞 ⋮</div>
    </div>
    <div class="wa-chat" id="chat"></div>
    <div class="wa-footer"><div class="wa-input">Escreve uma mensagem</div><div class="wa-send">➤</div></div>
  </div>
</div>
<script>
(function(){
  const chat=document.getElementById('chat');
  const convo=[
    {side:'in',text:'Gostei da proposta mas honestamente… LSF parece mais caro que construção normal 🤔',time:'10:14'},
    {side:'out',delay:900,typing:1800,text:'Percebo. É a dúvida mais comum. Mas olhe bem nos números ↓',time:'10:14'},
    {side:'out',delay:500,typing:2200,text:'<b>Construção tradicional T3 135m²:</b>\n• Orçamento inicial: 145.000€\n• Derrapagem média: +20% a +40%\n• <b>Total real: 174.000€ a 203.000€</b>\n• Prazo: 14-18 meses',time:'10:15'},
    {side:'out',delay:600,typing:2000,text:'<b>OBRASNET LSF T3 135m²:</b>\n✔ Preço fechado: 168.000€\n✔ Zero derrapagem\n✔ Entrega em 5-6 meses\n✔ Classe A+ (contas -60%)',time:'10:15'},
    {side:'in',delay:1100,text:'Espera, como garantem que não há derrapagem?',time:'10:16'},
    {side:'out',delay:600,typing:1800,text:'Estrutura industrializada em fábrica. Quantidades auditadas antes de começar. <b>Contrato com preço fechado</b>. Se passar, nós pagamos. 🤝',time:'10:16'},
    {side:'in',delay:1200,text:'Isso muda tudo. 💰',time:'10:17'}
  ];
  const wait=ms=>new Promise(r=>setTimeout(r,ms));
  function addB(s,t,time){
    const b=document.createElement('div');
    b.className='wa-bubble '+(s==='in'?'wa-bubble-in':'wa-bubble-out');
    b.innerHTML=t.replace(/\n/g,'<br>')+`<span class="time">${time}${s==='out'?'<span class="ticks">✓✓</span>':''}</span>`;
    chat.appendChild(b);
    requestAnimationFrame(()=>b.classList.add('show'));
  }
  function typing(){
    const t=document.createElement('div');
    t.className='wa-typing show';
    t.innerHTML='<span></span><span></span><span></span>';
    chat.appendChild(t);
    return t;
  }
  async function run(){
    await wait(600);
    for(const m of convo){
      if(m.delay) await wait(m.delay);
      if(m.typing){const t=typing(); await wait(m.typing); t.remove();}
      addB(m.side,m.text,m.time);
      await wait(300);
    }
    await wait(3000);
    window.location.reload();
  }
  window.addEventListener('load',()=>setTimeout(run,400));
})();
</script>
</body>
</html>
