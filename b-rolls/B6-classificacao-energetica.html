<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<title>B-Roll B6 — Classificação Energética A+</title>
<link rel="stylesheet" href="_shared/styles.css">
<style>
  .wrap { flex:1; display:flex; flex-direction:column; gap:30px; justify-content:center; align-items:center; }
  h1 { font-size:48px; font-weight:800; letter-spacing:-0.02em; text-align:center; line-height:1.1; }
  .sub { font-size:20px; color:#94a3b8; text-align:center; }
  .cert { width:700px; background:linear-gradient(165deg,#0f2a1e,#0a1f15);
          border:1px solid rgba(34,197,94,0.3); border-radius:24px; padding:40px; box-shadow:0 0 60px rgba(34,197,94,0.15); }
  .cert-title { font-size:14px; color:#64748b; letter-spacing:3px; text-transform:uppercase; text-align:center; font-weight:700; }
  .cert-house { text-align:center; font-size:16px; color:#94a3b8; margin-top:6px; }
  .scale { margin-top:30px; display:flex; flex-direction:column; gap:10px; }
  .bar { display:flex; align-items:center; gap:14px; }
  .bar-letter { width:60px; height:48px; border-radius:8px; display:flex; align-items:center; justify-content:center;
                font-size:22px; font-weight:800; color:#fff; opacity:0.3; transition:all 0.3s; }
  .bar-letter.active { opacity:1; transform:scale(1.12); box-shadow:0 0 25px rgba(0,0,0,0.4); }
  .bar-rect { flex:1; height:48px; border-radius:8px; opacity:0.25; transition:all 0.3s; }
  .bar-rect.active { opacity:1; box-shadow:0 0 25px currentColor; }
  .b-aplus { background:#16a34a; color:#16a34a; width:35%; }
  .b-a { background:#22c55e; color:#22c55e; width:45%; }
  .b-bplus { background:#84cc16; color:#84cc16; width:55%; }
  .b-b { background:#eab308; color:#eab308; width:65%; }
  .b-c { background:#f59e0b; color:#f59e0b; width:75%; }
  .b-d { background:#f97316; color:#f97316; width:85%; }
  .b-e { background:#ef4444; color:#ef4444; width:95%; }
  .bar-letter.lv-aplus { background:#16a34a; }
  .bar-letter.lv-a { background:#22c55e; }
  .bar-letter.lv-bplus { background:#84cc16; }
  .bar-letter.lv-b { background:#eab308; }
  .bar-letter.lv-c { background:#f59e0b; }
  .bar-letter.lv-d { background:#f97316; }
  .bar-letter.lv-e { background:#ef4444; }
  .final-seal { text-align:center; margin-top:30px; }
  .final-seal .big {
    width:200px; height:200px; margin:0 auto; border-radius:50%;
    background:conic-gradient(#16a34a 0deg var(--p,0deg), rgba(255,255,255,0.08) var(--p,0deg) 360deg);
    display:flex; align-items:center; justify-content:center; position:relative;
    transition:--p 2s cubic-bezier(0.4,0,0.2,1);
  }
  .final-seal .big::before { content:''; position:absolute; inset:15px; background:#0a1f15; border-radius:50%;
                             box-shadow:inset 0 0 30px rgba(34,197,94,0.3); }
  .final-seal .big span { position:relative; z-index:2; font-size:64px; font-weight:900; color:#22c55e;
                          text-shadow:0 0 30px rgba(34,197,94,0.6); letter-spacing:-2px; }
  .rays { position:absolute; inset:-40px; pointer-events:none; opacity:0; transition:opacity 0.8s; animation:rotate 10s linear infinite; }
  .rays.show { opacity:0.6; }
  @keyframes rotate { from { transform:rotate(0); } to { transform:rotate(360deg); } }
  .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:30px; }
  .stat { background:rgba(34,197,94,0.08); border:1px solid rgba(34,197,94,0.2); border-radius:12px; padding:16px; text-align:center; }
  .stat-v { font-size:26px; font-weight:800; color:#22c55e; font-family:'JetBrains Mono',monospace; }
  .stat-l { font-size:12px; color:#94a3b8; text-transform:uppercase; letter-spacing:1px; margin-top:4px; }
</style>
</head>
<body>
<div class="stage">
  <div class="grid-bg"></div>
  <div class="safe-area">
    <div class="logo-brand" style="margin-bottom:20px; align-self:flex-start;"><img src="_shared/assets/logo-obrasnet.png"></div>
    <div class="wrap">
      <h1>Todas as nossas casas<br><span class="text-gradient">Classe A+</span> garantida.</h1>
      <div class="cert">
        <div class="cert-title">Certificado Energético</div>
        <div class="cert-house">Moradia T3 · Óbidos · OBRASNET</div>
        <div class="scale" id="scale">
          <div class="bar"><div class="bar-letter lv-aplus" data-step="0">A+</div><div class="bar-rect b-aplus" data-step="0"></div></div>
          <div class="bar"><div class="bar-letter lv-a" data-step="1">A</div><div class="bar-rect b-a" data-step="1"></div></div>
          <div class="bar"><div class="bar-letter lv-bplus" data-step="2">B+</div><div class="bar-rect b-bplus" data-step="2"></div></div>
          <div class="bar"><div class="bar-letter lv-b" data-step="3">B</div><div class="bar-rect b-b" data-step="3"></div></div>
          <div class="bar"><div class="bar-letter lv-c" data-step="4">C</div><div class="bar-rect b-c" data-step="4"></div></div>
          <div class="bar"><div class="bar-letter lv-d" data-step="5">D</div><div class="bar-rect b-d" data-step="5"></div></div>
          <div class="bar"><div class="bar-letter lv-e" data-step="6">E</div><div class="bar-rect b-e" data-step="6"></div></div>
        </div>
        <div class="final-seal">
          <div class="big" id="seal" style="--p:0deg;">
            <svg class="rays" id="rays" viewBox="0 0 300 300"><g stroke="#22c55e" stroke-width="2" opacity="0.5">
              <line x1="150" y1="20" x2="150" y2="50"/><line x1="150" y1="250" x2="150" y2="280"/>
              <line x1="20" y1="150" x2="50" y2="150"/><line x1="250" y1="150" x2="280" y2="150"/>
              <line x1="50" y1="50" x2="70" y2="70"/><line x1="230" y1="230" x2="250" y2="250"/>
              <line x1="50" y1="250" x2="70" y2="230"/><line x1="230" y1="70" x2="250" y2="50"/>
            </g></svg>
            <span id="sealLetter">E</span>
          </div>
        </div>
        <div class="stats">
          <div class="stat"><div class="stat-v">-68%</div><div class="stat-l">Energia</div></div>
          <div class="stat"><div class="stat-v">-72%</div><div class="stat-l">CO₂</div></div>
          <div class="stat"><div class="stat-v">-60%</div><div class="stat-l">Contas</div></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
(function(){
  const wait=ms=>new Promise(r=>setTimeout(r,ms));
  const letters=['E','D','C','B','B+','A','A+'];
  const steps=[6,5,4,3,2,1,0];
  async function run(){
    const seal=document.getElementById('seal');
    const sealL=document.getElementById('sealLetter');
    await wait(800);
    for(let i=0;i<steps.length;i++){
      document.querySelectorAll('.bar-letter').forEach(el=>el.classList.remove('active'));
      document.querySelectorAll('.bar-rect').forEach(el=>el.classList.remove('active'));
      document.querySelector(`.bar-letter[data-step="${steps[i]}"]`).classList.add('active');
      document.querySelector(`.bar-rect[data-step="${steps[i]}"]`).classList.add('active');
      sealL.textContent=letters[i];
      if(i<3) sealL.style.color='#ef4444';
      else if(i<5) sealL.style.color='#eab308';
      else sealL.style.color='#22c55e';
      seal.style.setProperty('--p', (360*(i+1)/steps.length)+'deg');
      seal.style.background=`conic-gradient(${sealL.style.color} 0deg ${360*(i+1)/steps.length}deg, rgba(255,255,255,0.08) ${360*(i+1)/steps.length}deg 360deg)`;
      await wait(450);
    }
    document.getElementById('rays').classList.add('show');
    await wait(4000);
    window.location.reload();
  }
  window.addEventListener('load',()=>setTimeout(run,400));
})();
</script>
</body>
</html>
